<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="CLIP-JEPA blog banner with paper clip">
  <defs>
    <linearGradient id="bggrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1220"/>
      <stop offset="100%" stop-color="#1a2035"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2b3357" stroke-opacity="0.22" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#bggrad)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Glow blob behind title -->
  <circle cx="696" cy="264" r="226" fill="#72e7c8" opacity="0.08" filter="url(#softGlow)"/>
  <circle cx="864" cy="403" r="163" fill="#a0b6ff" opacity="0.10" filter="url(#softGlow)"/>
  
  <!-- Paper clip (two arcs, stroked) -->
  <path d="M 317.0,417.3 A 138,201 0 1 1 91.0,186.7 A 138,201 0 1 1 317.0,417.3" fill="none" stroke="#72e7c8" stroke-width="7" stroke-linecap="round" opacity="0.95"/>
  <path d="M 280.2,380.0 A 93,136 0 1 1 127.8,224.0 A 93,136 0 1 1 280.2,380.0" fill="none" stroke="#a0b6ff" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Embedding dots -->
  <g opacity="0.7">
    <circle cx="918" cy="123" r="2" fill="#72e7c8" /><circle cx="662" cy="169" r="2" fill="#bac2de" /><circle cx="942" cy="473" r="2" fill="#72e7c8" /><circle cx="886" cy="126" r="2" fill="#bac2de" /><circle cx="645" cy="317" r="2" fill="#72e7c8" /><circle cx="867" cy="402" r="4" fill="#bac2de" /><circle cx="857" cy="202" r="3" fill="#72e7c8" /><circle cx="684" cy="463" r="2" fill="#bac2de" /><circle cx="956" cy="250" r="2" fill="#72e7c8" /><circle cx="643" cy="421" r="2" fill="#bac2de" /><circle cx="564" cy="152" r="2" fill="#72e7c8" /><circle cx="895" cy="438" r="4" fill="#bac2de" /><circle cx="801" cy="163" r="3" fill="#72e7c8" /><circle cx="555" cy="231" r="4" fill="#bac2de" /><circle cx="904" cy="460" r="3" fill="#72e7c8" /><circle cx="628" cy="141" r="4" fill="#bac2de" /><circle cx="651" cy="230" r="2" fill="#72e7c8" /><circle cx="1058" cy="462" r="3" fill="#bac2de" /><circle cx="684" cy="369" r="2" fill="#72e7c8" /><circle cx="609" cy="256" r="4" fill="#bac2de" /><circle cx="677" cy="491" r="4" fill="#72e7c8" /><circle cx="550" cy="369" r="3" fill="#bac2de" /><circle cx="976" cy="179" r="3" fill="#72e7c8" /><circle cx="678" cy="486" r="4" fill="#bac2de" /><circle cx="864" cy="389" r="2" fill="#72e7c8" /><circle cx="652" cy="126" r="2" fill="#bac2de" />
  </g>
  
  <!-- Title & subtitle -->
  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
    <text x="408" y="277" font-size="75" fill="#f5f7ff" font-weight="800" letter-spacing="1.5">CLIP–JEPA</text>
    <text x="408" y="340" font-size="26" fill="#bac2de" font-weight="500">Cycle‑consistent contrastive learning with &lt;EMBED&gt; tokens</text>
  </g>
</svg>
